# Desktop target layout: 1/3:4:3/1
# Rows separated by /, columns separated by : within a row
# Numbers are proportional units (fr)

[target]
name = "desktop"
screen = "14-32 inch landscape"
interaction = "mouse-keyboard"

[grid]
# Row definitions — order = top to bottom
[[grid.rows]]
name = "top"
ratio = 1
fixed = "nav-bar"

[[grid.rows]]
name = "main"
ratio = 10          # total of column ratios (3+4+3)

  [[grid.rows.columns]]
  name = "left"
  ratio = 3

  [[grid.rows.columns]]
  name = "center"
  ratio = 4

  [[grid.rows.columns]]
  name = "right"
  ratio = 3

[[grid.rows]]
name = "bottom"
ratio = 1
fixed = "status-bar"
