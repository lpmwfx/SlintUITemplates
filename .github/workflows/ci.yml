name: CI

on:
  push:
    branches: [master, "aidevops/**"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run scanners
        run: cargo run -p scanners

      - name: Build (workspace, all targets)
        run: cargo build --workspace --all-targets

      - name: Run tests (workspace)
        run: cargo test --workspace

      - name: Build core-only (no default features)
        run: cargo build -p slint-ui-templates --no-default-features

      - name: Test core-only (no default features)
        run: cargo test -p slint-ui-templates --no-default-features

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (workspace, warnings as errors)
        run: cargo clippy --workspace -- -D warnings
